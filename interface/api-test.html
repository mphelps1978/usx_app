<!DOCTYPE html>
<html>
	<head>
		<title>API Test</title>
		<script>
			async function testAPI() {
				try {
					console.log("Testing API connection...");
					const response = await fetch("http://172.20.10.4:3001/api/loads", {
						method: "GET",
						headers: {
							"Content-Type": "application/json",
						},
					});
					console.log("Response status:", response.status);
					console.log("Response headers:", response.headers);
					const data = await response.text();
					console.log("Response data:", data);

					if (response.status === 401) {
						document.body.innerHTML +=
							'<p style="color: green;">API is reachable (401 Unauthorized is expected without token)</p>';
					} else {
						document.body.innerHTML +=
							'<p style="color: red;">API response: ' +
							response.status +
							"</p>";
					}
				} catch (error) {
					console.error("API test failed:", error);
					document.body.innerHTML +=
						'<p style="color: red;">API test failed: ' + error.message + "</p>";
				}
			}

			// Run test when page loads
			window.onload = testAPI;
		</script>
	</head>
	<body>
		<h1>API Connection Test</h1>
		<p>Testing connection to backend API...</p>
	</body>
</html>
