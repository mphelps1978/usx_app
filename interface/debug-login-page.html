<!DOCTYPE html>
<html>
	<head>
		<title>Debug Login Page</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 20px;
			}
			.container {
				max-width: 400px;
				margin: 0 auto;
			}
			.form-group {
				margin-bottom: 15px;
			}
			label {
				display: block;
				margin-bottom: 5px;
				font-weight: bold;
			}
			input {
				width: 100%;
				padding: 8px;
				border: 1px solid #ddd;
				border-radius: 4px;
				box-sizing: border-box;
			}
			button {
				width: 100%;
				padding: 10px;
				background-color: #007bff;
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
			}
			button:hover {
				background-color: #0056b3;
			}
			.debug-section {
				margin-top: 20px;
				padding: 15px;
				background-color: #f8f9fa;
				border-radius: 4px;
				border: 1px solid #dee2e6;
			}
			.debug-title {
				font-weight: bold;
				margin-bottom: 10px;
				color: #495057;
			}
			.debug-content {
				font-family: monospace;
				font-size: 12px;
				white-space: pre-wrap;
				background-color: #fff;
				padding: 10px;
				border-radius: 4px;
				border: 1px solid #dee2e6;
			}
			.status {
				margin-top: 10px;
				padding: 10px;
				border-radius: 4px;
			}
			.status.success {
				background-color: #d4edda;
				color: #155724;
				border: 1px solid #c3e6cb;
			}
			.status.error {
				background-color: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}
			.status.info {
				background-color: #d1ecf1;
				color: #0c5460;
				border: 1px solid #bee5eb;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h2>Debug Login Page</h2>
			<form id="loginForm">
				<div class="form-group">
					<label for="email">Email:</label>
					<input type="email" id="email" name="email" required />
				</div>
				<div class="form-group">
					<label for="password">Password:</label>
					<input type="password" id="password" name="password" required />
				</div>
				<button type="submit">Login</button>
			</form>

			<div class="debug-section">
				<div class="debug-title">Debug Information:</div>
				<div id="debugContent" class="debug-content">
					Waiting for login attempt...
				</div>
			</div>

			<div id="status" class="status info">Ready to login</div>
		</div>

		<script>
			document
				.getElementById("loginForm")
				.addEventListener("submit", async function (e) {
					e.preventDefault();

					const email = document.getElementById("email").value;
					const password = document.getElementById("password").value;
					const debugContent = document.getElementById("debugContent");
					const status = document.getElementById("status");

					// Clear previous debug info
					debugContent.innerHTML = "";
					status.className = "status info";
					status.textContent = "Attempting login...";

					try {
						// Show what we're about to send
						debugContent.innerHTML += "=== REQUEST DETAILS ===\n";
						debugContent.innerHTML +=
							"URL: http://172.20.10.4:3001/api/login\n";
						debugContent.innerHTML += "Method: POST\n";
						debugContent.innerHTML += "Headers:\n";
						debugContent.innerHTML += "  Content-Type: application/json\n";
						debugContent.innerHTML += "\nBody:\n";
						debugContent.innerHTML += JSON.stringify(
							{ email, password },
							null,
							2
						);
						debugContent.innerHTML += "\n\n";

						// Make the actual login request
						const response = await fetch("http://172.20.10.4:3001/api/login", {
							method: "POST",
							headers: {
								"Content-Type": "application/json",
							},
							body: JSON.stringify({ email, password }),
						});

						// Show response details
						debugContent.innerHTML += "=== RESPONSE DETAILS ===\n";
						debugContent.innerHTML +=
							"Status: " + response.status + " " + response.statusText + "\n";
						debugContent.innerHTML += "Headers:\n";

						// Log all response headers
						response.headers.forEach((value, key) => {
							debugContent.innerHTML += "  " + key + ": " + value + "\n";
						});

						debugContent.innerHTML += "\n";

						// Try to read response body
						const responseText = await response.text();
						debugContent.innerHTML += "Response Body:\n";
						debugContent.innerHTML += responseText + "\n";

						if (response.ok) {
							status.className = "status success";
							status.textContent = "Login successful!";
							debugContent.innerHTML += "\n✅ Login was successful!";
						} else {
							status.className = "status error";
							status.textContent =
								"Login failed with status: " + response.status;
							debugContent.innerHTML += "\n❌ Login failed!";
						}
					} catch (error) {
						debugContent.innerHTML += "=== ERROR DETAILS ===\n";
						debugContent.innerHTML += "Error Type: " + error.name + "\n";
						debugContent.innerHTML += "Error Message: " + error.message + "\n";
						debugContent.innerHTML += "Stack Trace:\n" + error.stack + "\n";

						status.className = "status error";
						status.textContent = "Network error: " + error.message;

						console.error("Login error details:", error);
					}
				});
		</script>
	</body>
</html>
