<!DOCTYPE html>
<html>
	<head>
		<title>Debug Login</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 20px;
			}
			.test-result {
				margin: 10px 0;
				padding: 10px;
				border-radius: 4px;
			}
			.success {
				background-color: #d4edda;
				color: #155724;
				border: 1px solid #c3e6cb;
			}
			.error {
				background-color: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}
			.info {
				background-color: #d1ecf1;
				color: #0c5460;
				border: 1px solid #bee5eb;
			}
		</style>
		<script>
			async function runDebugTests() {
				const results = [];

				// Test 1: Check if we can access the frontend
				try {
					const frontendResponse = await fetch("http://172.20.10.4:5173/", {
						method: "GET",
						mode: "cors",
						credentials: "omit",
					});
					results.push({
						test: "Frontend Access",
						status: frontendResponse.status,
						success: frontendResponse.status === 200,
						details: "Frontend is accessible",
					});
				} catch (error) {
					results.push({
						test: "Frontend Access",
						status: "ERROR",
						success: false,
						details: "Error: " + error.message,
					});
				}

				// Test 2: Check API connectivity
				try {
					const apiResponse = await fetch("http://172.20.10.4:3001/api/loads", {
						method: "GET",
						mode: "cors",
						credentials: "omit",
						headers: {
							"Content-Type": "application/json",
						},
					});
					results.push({
						test: "API Connectivity",
						status: apiResponse.status,
						success: apiResponse.status === 401, // 401 is expected without auth
						details: "API is accessible (401 expected without auth)",
					});
				} catch (error) {
					results.push({
						test: "API Connectivity",
						status: "ERROR",
						success: false,
						details: "Error: " + error.message,
					});
				}

				// Test 3: Test login endpoint
				try {
					const loginResponse = await fetch(
						"http://172.20.10.4:3001/api/login",
						{
							method: "POST",
							mode: "cors",
							credentials: "omit",
							headers: {
								"Content-Type": "application/json",
							},
							body: JSON.stringify({
								email: "test@example.com",
								password: "testpassword",
							}),
						}
					);
					results.push({
						test: "Login Endpoint",
						status: loginResponse.status,
						success: loginResponse.status === 401, // 401 expected with invalid credentials
						details:
							"Login endpoint is working (401 expected with invalid credentials)",
					});
				} catch (error) {
					results.push({
						test: "Login Endpoint",
						status: "ERROR",
						success: false,
						details: "Error: " + error.message,
					});
				}

				// Test 4: Check network information
				const networkInfo = {
					connection:
						navigator.connection ||
						navigator.mozConnection ||
						navigator.webkitConnection ||
						{},
					userAgent: navigator.userAgent,
					platform: navigator.platform,
					language: navigator.language,
				};

				// Display results
				displayResults(results, networkInfo);
			}

			function displayResults(results, networkInfo) {
				const container = document.getElementById("results");

				results.forEach((result) => {
					const div = document.createElement("div");
					div.className = result.success
						? "test-result success"
						: "test-result error";
					div.innerHTML = `
                    <strong>${result.test}</strong><br>
                    Status: ${result.status}<br>
                    Details: ${result.details}
                `;
					container.appendChild(div);
				});

				// Add network info
				const networkDiv = document.createElement("div");
				networkDiv.className = "test-result info";
				networkDiv.innerHTML = `
                <strong>Network Information:</strong><br>
                User Agent: ${networkInfo.userAgent}<br>
                Platform: ${networkInfo.platform}<br>
                Language: ${networkInfo.language}<br>
                Connection Type: ${
									networkInfo.connection.effectiveType || "Unknown"
								}<br>
                Downlink: ${networkInfo.connection.downlink || "Unknown"} Mbps
            `;
				container.appendChild(networkDiv);

				// Add instructions
				const instructionsDiv = document.createElement("div");
				instructionsDiv.className = "test-result info";
				instructionsDiv.innerHTML = `
                <strong>Next Steps:</strong><br>
                1. Open Chrome DevTools on your Mac<br>
                2. Go to Developer Tools > Audits<br>
                3. Select "Remote devices" and connect to your iPad<br>
                4. Check the Console tab for any JavaScript errors<br>
                5. Check the Network tab for failed requests
            `;
				container.appendChild(instructionsDiv);
			}

			// Run tests when page loads
			window.onload = runDebugTests;
		</script>
	</head>
	<body>
		<h1>Debug Login Test</h1>
		<p>Running comprehensive tests to identify the login issue...</p>
		<div id="results"></div>
	</body>
</html>
