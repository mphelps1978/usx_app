<!DOCTYPE html>
<html>
	<head>
		<title>Detailed Login Test</title>
		<script>
			async function testDetailedLogin() {
				try {
					console.log("Starting detailed login test...");

					// Test 1: Simple GET request to check basic connectivity
					console.log("Test 1: Testing basic connectivity...");
					const getResponse = await fetch("http://172.20.10.4:3001/api/loads", {
						method: "GET",
						headers: {
							"Content-Type": "application/json",
						},
					});
					console.log("GET response status:", getResponse.status);

					// Test 2: POST request with valid credentials (if you have them)
					console.log("Test 2: Testing POST request...");
					const postResponse = await fetch(
						"http://172.20.10.4:3001/api/login",
						{
							method: "POST",
							headers: {
								"Content-Type": "application/json",
							},
							body: JSON.stringify({
								email: "test@example.com",
								password: "testpassword",
							}),
						}
					);
					console.log("POST response status:", postResponse.status);
					const postData = await postResponse.text();
					console.log("POST response data:", postData);

					// Test 3: Check if we can access the frontend
					console.log("Test 3: Testing frontend access...");
					const frontendResponse = await fetch("http://172.20.10.4:5173/");
					console.log("Frontend response status:", frontendResponse.status);

					document.body.innerHTML += "<h2>Detailed Login Test Results:</h2>";
					document.body.innerHTML +=
						"<p><strong>Test 1 (GET API):</strong> Status " +
						getResponse.status +
						"</p>";
					document.body.innerHTML +=
						"<p><strong>Test 2 (POST Login):</strong> Status " +
						postResponse.status +
						"</p>";
					document.body.innerHTML +=
						"<p><strong>Test 3 (Frontend):</strong> Status " +
						frontendResponse.status +
						"</p>";

					if (postResponse.status === 401) {
						document.body.innerHTML +=
							'<p style="color: green;">✅ All tests passed - login endpoint is working correctly</p>';
					} else {
						document.body.innerHTML +=
							'<p style="color: red;">❌ Unexpected response from login endpoint</p>';
					}
				} catch (error) {
					console.error("Detailed login test failed:", error);
					document.body.innerHTML += "<h2>Detailed Login Test Results:</h2>";
					document.body.innerHTML +=
						'<p style="color: red;">❌ Test failed: ' + error.message + "</p>";
					document.body.innerHTML +=
						"<p><strong>Error details:</strong> " + error.stack + "</p>";
				}
			}

			// Run test when page loads
			window.onload = testDetailedLogin;
		</script>
	</head>
	<body>
		<h1>Detailed Login Test</h1>
		<p>Testing all aspects of the login process...</p>
	</body>
</html>
