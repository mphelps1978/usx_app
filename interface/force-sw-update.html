<!DOCTYPE html>
<html>
	<head>
		<title>Force Service Worker Update</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 40px;
				text-align: center;
			}
			.container {
				max-width: 600px;
				margin: 0 auto;
			}
			.status {
				margin: 20px 0;
				padding: 15px;
				border-radius: 5px;
			}
			.success {
				background: #e8f5e9;
				border: 1px solid #4caf50;
				color: #2e7d32;
			}
			.error {
				background: #ffebee;
				border: 1px solid #f44336;
				color: #c62828;
			}
			.info {
				background: #e3f2fd;
				border: 1px solid #2196f3;
				color: #1565c0;
			}
			button {
				padding: 10px 20px;
				font-size: 16px;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>Force Service Worker Update</h1>
			<p>
				This page will help clear the old service worker and force an update.
			</p>

			<div id="status" class="status info">
				Status: Checking for service workers...
			</div>

			<button onclick="clearServiceWorkers()">Clear All Service Workers</button>
			<button onclick="reloadPage()">Reload Page</button>

			<div style="margin-top: 30px">
				<h3>After clearing:</h3>
				<p>1. Click "Reload Page"</p>
				<p>
					2. Visit the test page:
					<a href="/test-api-config.html">/test-api-config.html</a>
				</p>
				<p>3. Try logging in again</p>
			</div>
		</div>

		<script>
			async function clearServiceWorkers() {
				const status = document.getElementById("status");
				status.className = "status info";
				status.textContent = "Clearing service workers...";

				try {
					// Get all service workers
					const registrations =
						await navigator.serviceWorker.getRegistrations();

					if (registrations.length === 0) {
						status.className = "status info";
						status.textContent = "No service workers found.";
						return;
					}

					// Unregister all service workers
					for (const registration of registrations) {
						await registration.unregister();
					}

					status.className = "status success";
					status.textContent = `Cleared ${registrations.length} service worker(s). Please reload the page.`;
				} catch (error) {
					status.className = "status error";
					status.textContent =
						"Error clearing service workers: " + error.message;
				}
			}

			function reloadPage() {
				location.reload();
			}

			// Check for service workers on load
			window.addEventListener("load", async () => {
				try {
					const registrations =
						await navigator.serviceWorker.getRegistrations();
					const status = document.getElementById("status");

					if (registrations.length > 0) {
						status.className = "status error";
						status.innerHTML = `Found ${registrations.length} service worker(s).<br>Click "Clear All Service Workers" to remove them.`;
					} else {
						status.className = "status success";
						status.textContent = "No service workers found.";
					}
				} catch (error) {
					console.error("Error checking service workers:", error);
				}
			});
		</script>
	</body>
</html>
