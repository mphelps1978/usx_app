<!DOCTYPE html>
<html>
	<head>
		<title>API Configuration Test</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 40px;
			}
			.result {
				margin: 20px 0;
				padding: 15px;
				background: #f5f5f5;
				border-radius: 5px;
			}
			.error {
				background: #ffebee;
				border: 1px solid #f44336;
			}
			.success {
				background: #e8f5e9;
				border: 1px solid #4caf50;
			}
		</style>
	</head>
	<body>
		<h1>API Configuration Test</h1>
		<div id="results"></div>

		<script>
			// Test the API configuration
			function testApiConfig() {
				const hostname = window.location.hostname;
				const protocol = window.location.protocol;

				let apiUrl;
				let environment;

				// Production environment (Vercel deployment)
				if (hostname.includes("vercel.app")) {
					apiUrl = `${protocol}//${hostname}/api`;
					environment = "production";
				}
				// iPad deployment
				else if (hostname === "172.20.10.4") {
					apiUrl = "http://172.20.10.4:3001/api";
					environment = "ipad";
				}
				// Local development
				else {
					apiUrl = "http://localhost:3001/api";
					environment = "development";
				}

				const results = document.getElementById("results");

				results.innerHTML = `
                <div class="result">
                    <h3>Environment Detection:</h3>
                    <p><strong>Hostname:</strong> ${hostname}</p>
                    <p><strong>Protocol:</strong> ${protocol}</p>
                    <p><strong>Detected Environment:</strong> ${environment}</p>
                    <p><strong>API URL:</strong> ${apiUrl}</p>
                </div>
            `;

				// Test if this is the correct API URL
				if (hostname.includes("vercel.app") && apiUrl.includes("localhost")) {
					results.innerHTML += `
                    <div class="error result">
                        <h3>❌ ERROR: Wrong API URL for Vercel!</h3>
                        <p>Expected: ${protocol}//${hostname}/api</p>
                        <p>Actual: ${apiUrl}</p>
                        <p>The hostname detection logic needs to be fixed.</p>
                    </div>
                `;
				} else if (hostname.includes("vercel.app")) {
					results.innerHTML += `
                    <div class="success result">
                        <h3>✅ SUCCESS: Correct API URL for Vercel!</h3>
                        <p>The API URL should be: ${apiUrl}</p>
                    </div>
                `;
				}
			}

			testApiConfig();
		</script>
	</body>
</html>
