<!DOCTYPE html>
<html>
	<head>
		<title>Test Login Handling</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 20px;
			}
			.container {
				max-width: 600px;
				margin: 0 auto;
			}
			.form-group {
				margin-bottom: 15px;
			}
			label {
				display: block;
				margin-bottom: 5px;
				font-weight: bold;
			}
			input {
				width: 100%;
				padding: 8px;
				border: 1px solid #ddd;
				border-radius: 4px;
				box-sizing: border-box;
			}
			button {
				padding: 10px 20px;
				background-color: #007bff;
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				margin-right: 10px;
			}
			button:hover {
				background-color: #0056b3;
			}
			.debug-section {
				margin-top: 20px;
				padding: 15px;
				background-color: #f8f9fa;
				border-radius: 4px;
				border: 1px solid #dee2e6;
			}
			.debug-title {
				font-weight: bold;
				margin-bottom: 10px;
				color: #495057;
			}
			.debug-content {
				font-family: monospace;
				font-size: 12px;
				white-space: pre-wrap;
				background-color: #fff;
				padding: 10px;
				border-radius: 4px;
				border: 1px solid #dee2e6;
			}
			.status {
				margin-top: 10px;
				padding: 10px;
				border-radius: 4px;
			}
			.status.success {
				background-color: #d4edda;
				color: #155724;
				border: 1px solid #c3e6cb;
			}
			.status.error {
				background-color: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}
			.status.info {
				background-color: #d1ecf1;
				color: #0c5460;
				border: 1px solid #bee5eb;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h2>Test Login Handling</h2>
			<p>
				This test will simulate what the React app does after a successful login
				to identify where the error occurs.
			</p>

			<form id="loginForm">
				<div class="form-group">
					<label for="email">Email:</label>
					<input type="email" id="email" name="email" required />
				</div>
				<div class="form-group">
					<label for="password">Password:</label>
					<input type="password" id="password" name="password" required />
				</div>
				<button type="button" id="testLogin">Test Login Only</button>
				<button type="button" id="testFullFlow">Test Full Login Flow</button>
			</form>

			<div class="debug-section">
				<div class="debug-title">Debug Information:</div>
				<div id="debugContent" class="debug-content">Waiting for test...</div>
			</div>

			<div id="status" class="status info">Ready to test</div>
		</div>

		<script>
			const debugContent = document.getElementById("debugContent");
			const status = document.getElementById("status");

			function clearDebug() {
				debugContent.innerHTML = "";
				status.className = "status info";
				status.textContent = "Testing...";
			}

			function log(message) {
				debugContent.innerHTML += message + "\n";
			}

			// Test 1: Just the login request (like our debug page)
			document
				.getElementById("testLogin")
				.addEventListener("click", async function () {
					clearDebug();
					log("=== TEST 1: Login Request Only ===");

					const email = document.getElementById("email").value;
					const password = document.getElementById("password").value;

					try {
						const response = await fetch("http://172.20.10.4:3001/api/login", {
							method: "POST",
							headers: { "Content-Type": "application/json" },
							body: JSON.stringify({ email, password }),
						});

						log("Login Response Status: " + response.status);
						const data = await response.json();
						log("Login Response Data: " + JSON.stringify(data, null, 2));

						if (response.ok) {
							status.className = "status success";
							status.textContent = "Login successful!";
							log("✅ Login request works fine");
						} else {
							status.className = "status error";
							status.textContent = "Login failed";
							log("❌ Login request failed");
						}
					} catch (error) {
						log("❌ Login request error: " + error.message);
						status.className = "status error";
						status.textContent = "Login request failed: " + error.message;
					}
				});

			// Test 2: Full login flow (like React app)
			document
				.getElementById("testFullFlow")
				.addEventListener("click", async function () {
					clearDebug();
					log("=== TEST 2: Full Login Flow (React App Simulation) ===");

					const email = document.getElementById("email").value;
					const password = document.getElementById("password").value;

					try {
						// Step 1: Login request
						log("Step 1: Making login request...");
						const response = await fetch("http://172.20.10.4:3001/api/login", {
							method: "POST",
							headers: { "Content-Type": "application/json" },
							body: JSON.stringify({ email, password }),
						});

						log("Login Response Status: " + response.status);
						const data = await response.json();
						log("Login Response Data: " + JSON.stringify(data, null, 2));

						if (!response.ok) {
							throw new Error("Login failed: " + response.status);
						}

						// Step 2: Store token in localStorage (like React app)
						log("Step 2: Storing token in localStorage...");
						try {
							localStorage.setItem("authToken", data.token);
							log("✅ localStorage.setItem successful");
						} catch (storageError) {
							log("❌ localStorage.setItem failed: " + storageError.message);
							throw storageError;
						}

						// Step 3: Set axios-like headers (simulate setting auth header)
						log("Step 3: Setting authorization header...");
						try {
							// Simulate setting axios headers
							const mockAxios = { defaults: { headers: { common: {} } } };
							mockAxios.defaults.headers.common["Authorization"] =
								"Bearer " + data.token;
							log("✅ Authorization header set successfully");
						} catch (headerError) {
							log("❌ Authorization header failed: " + headerError.message);
							throw headerError;
						}

						// Step 4: Navigate (simulate React router navigation)
						log("Step 4: Simulating navigation...");
						try {
							// We can't actually navigate, but we can simulate the navigation logic
							log("✅ Navigation simulation successful");
						} catch (navError) {
							log("❌ Navigation failed: " + navError.message);
							throw navError;
						}

						status.className = "status success";
						status.textContent = "Full login flow successful!";
						log("🎉 All steps completed successfully!");
					} catch (error) {
						log("❌ Full login flow failed at: " + error.message);
						status.className = "status error";
						status.textContent = "Full login flow failed: " + error.message;
					}
				});
		</script>
	</body>
</html>
